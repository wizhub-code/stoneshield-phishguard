version: "3.9"

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phishguard-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data        # Persistent SQLite storage
    environment:
      - APP_NAME=Stoneshield PhishGuard
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite:////app/data/stoneshield.db
      - ALLOWED_ORIGINS=["http://localhost:3000","https://yourdomain.com"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (serve the HTML dashboard) ─────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: phishguard-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./stoneshield-phishguard.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - api

volumes:
  db_data:
    driver: local
